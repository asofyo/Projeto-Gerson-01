<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Loja Dev</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Sua Loja Digital</h1>
    </header>

    <main>
        <section id="cadastro">
            <h2>Cadastrar Novo Produto</h2>
            <form id="form-produto">
                <input type="text" id="nome" placeholder="Nome do Produto" required>
                <input type="number" id="preco" placeholder="Preço (R$)" step="0.01" required>
                <button type="submit">Adicionar Produto</button>
            </form>
        </section>

        <hr>

        <section id="estoque">
            <h2>Produtos em Estoque</h2>
            <input type="text" id="busca" placeholder="Buscar produto pelo nome...">
            
            <table id="tabela-produtos">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Preço</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="lista-corpo">
                    </tbody>
            </table>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
